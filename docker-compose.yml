version: "3.9"

services:
  # ── In-memory mode ───────────────────────────────────────────────────────
  # docker compose --profile memory up
  api:
    profiles: [memory]
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_DRIVER=memory

  # ── PostgreSQL mode ───────────────────────────────────────────────────────
  # docker compose --profile postgres up
  api-postgres:
    build: .
    profiles: [postgres]
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_DRIVER=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=transactions
      - DB_SSLMODE=disable
    depends_on:
      db:
        condition: service_healthy

  db:
    profiles: [postgres]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transactions
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
